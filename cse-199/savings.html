<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saving Goals</title>
    <link rel="stylesheet" href="savings.css">
</head>
<body>

    <header>
        <h1>Saving Goals</h1>

        <nav>
            <a href="index.html">← Back to Dashboard</a>
        </nav>
    </header>

    <main>

        <section class="goal-card">
            <div class="goal-top">
                <h2>Emergency Fund</h2>
                <p>$2,500 / $5,000</p>
            </div>

            <div class="progress-bar">
                <div class="progress emergency"></div>
            </div>

            <p class="goal-percent">50% Complete</p>
        </section>

        <section class="goal-card">
            <div class="goal-top">
                <h2>New Laptop</h2>
                <p>$800 / $1,200</p>
            </div>

            <div class="progress-bar">
                <div class="progress laptop"></div>
            </div>

            <p class="goal-percent">67% Complete</p>
        </section>

        <section class="goal-card">
            <div class="goal-top">
                <h2>Vacation</h2>
                <p>$1,400 / $3,000</p>
            </div>

            <div class="progress-bar">
                <div class="progress vacation"></div>
            </div>

            <p class="goal-percent">47% Complete</p>
        </section>

        <section class="goal-card add-goal">
            <button>Add New Goal</button>
        </section>

    </main>

</body>
</html>
